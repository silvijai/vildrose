name: Docs

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install mdbook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Install mdbook-d2
        run: cargo install mdbook-d2 --locked

      - name: Install D2
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --

      - name: Build rustdoc
        run: cargo doc --workspace --no-deps

      - name: Test mdBook
        run: mdbook test docs/

      - name: Build mdBook site
        run: mdbook build docs/

      - name: Assemble Pages directory
        if: github.ref == 'refs/heads/main'
        run: |
          rm -rf public
          mkdir -p public

          cp -R docs/site/. public/
          cp -R target/mdbook/. public/book/
          cp -R target/doc/. public/api/

          touch public/.nojekyll
          touch public/book/.nojekyll
          touch public/api/.nojekyll

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
